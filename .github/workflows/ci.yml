name: Calidad

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar fuentes, datos y pruebas unitarias
        run: npm run check

      - name: Auditar dependencias
        run: npm audit --audit-level=high

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas E2E y accesibilidad
        run: npm run test:e2e

      - name: Preparar sitio estático
        run: npm run build

      - name: Conservar informe de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
