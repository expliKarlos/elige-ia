name: Calidad

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Descargar código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar fuentes, datos y pruebas unitarias
        run: npm run check

      - name: Auditar dependencias
        run: npm audit --audit-level=high

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas E2E y accesibilidad
        run: npm run test:e2e

      - name: Preparar sitio estático
        run: npm run build

      - name: Conservar informe de Playwright si falla
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
